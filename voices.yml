# Voice catalog. The `id` field is the ElevenLabs voice ID — same value
# stored on PodcastProfileRecord.voice_id. To add a new voice: append a new
# entry with its ElevenLabs voice ID, human-friendly name, gender,
# description, and enabled: true. Loader filters out enabled: false entries
# so disabled rows never reach the iOS picker. No app deploy needed when
# toggling a voice on/off — backend revision rollout picks up the change.

voices:
