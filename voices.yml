# Voice catalog. The `id` field is the ElevenLabs voice ID — same value
# stored on PodcastProfileRecord.voice_id. To add a new voice:
#   1. Replace the TODO_VOICE_* placeholder id with the real ElevenLabs voice ID.
#   2. Replace the placeholder name with the human-friendly voice name.
#   3. Set enabled to true.
# Loader filters out enabled: false entries, so disabled placeholders never reach
# the iOS picker. No app deploy needed when toggling a voice on/off — backend
# revision rollout picks up the change.

