workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      ios_signing:
        # ios_signing handles the main app's cert + profile install into
        # a managed keychain. The share extension (com.newsletterpod.app.share)
        # gets its profile downloaded by an extra script step below — we
        # can't ask fetch-signing-files to handle it because that command
        # also tries to save the certificate as a local file, and the
        # `app_store_connect: codemagic` integration's cert only lives in
        # the managed keychain (no private key file path exposed).
        distribution_type: app_store
        bundle_identifier: com.newsletterpod.app
      vars:
        XCODE_PROJECT: "ios/NewsletterPod.xcodeproj"
        XCODE_SCHEME: "NewsletterPod"
        APP_STORE_APPLE_ID: "6762568729"
      xcode: latest
    scripts:
      - name: Build design tokens
        script: |
          # design-tokens lives in a submodule (TheAntelope/clawcast-tokens).
          # Codemagic shallow-clones without submodules by default — pull it now.
          cd "$CM_BUILD_DIR"
          git submodule update --init --recursive
          cd "$CM_BUILD_DIR/design-tokens"
          npm ci
          npm run build
          # Refresh the iOS-side committed copy from the submodule's dist/
          # output so Xcode sees the freshly generated file.
          cp dist/DesignTokens.swift "$CM_BUILD_DIR/ios/NewsletterPodApp/DesignTokens.swift"
          # Fail the build if the iOS Swift file drifted from what the submodule
          # generates — caught when a dev edits tokens.json without re-copying.
          cd "$CM_BUILD_DIR"
          if ! git diff --exit-code ios/NewsletterPodApp/DesignTokens.swift; then
            echo "ERROR: ios/NewsletterPodApp/DesignTokens.swift is stale. Update the design-tokens submodule (or run 'npm run build' inside it), copy dist/DesignTokens.swift to ios/NewsletterPodApp/, and commit."
            exit 1
          fi
      - name: Generate Xcode project
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          cd "$CM_BUILD_DIR/ios"
          xcodegen generate --spec project.yml
      - name: Regenerate provisioning profiles for both bundle ids
        script: |
          # The existing "The Antelope - Newsletter Pod" profile that
          # ios_signing fetched predates the App Groups capability
          # assignment, so it can't satisfy the share-extension build's
          # entitlements. Rather than trying to patch it, we regenerate
          # BOTH profiles fresh against the newest distribution cert,
          # nuking the local cache + any stale server-side profiles for
          # these two bundle ids. Idempotent: every build provisions
          # clean.
          set -e

          MAIN_BUNDLE=com.newsletterpod.app
          EXT_BUNDLE=com.newsletterpod.app.share

          # Pick the newest distribution cert (sorted by expirationDate
          # desc, so revoked/expired certs lose to the active one).
          CERT_ID=$(app-store-connect certificates list --json \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          certs = [c for c in data
                   if 'DISTRIBUTION' in (c.get('attributes', {}).get('certificateType') or '').upper()]
          certs.sort(key=lambda c: c.get('attributes', {}).get('expirationDate', ''), reverse=True)
          print(certs[0]['id'] if certs else '')
          ")
          if [ -z "$CERT_ID" ]; then
            echo "ERROR: no distribution certificate found in App Store Connect"
            exit 1
          fi
          echo "Using cert $CERT_ID"

          # Look up bundle id resource IDs (separate from identifier strings).
          # CRITICAL: --bundle-id-identifier does a PREFIX match, so a query for
          # "com.newsletterpod.app" returns BOTH com.newsletterpod.app AND
          # com.newsletterpod.app.share. Filter in Python with an exact match
          # on attributes.identifier to avoid pointing both profiles at the
          # share extension's bundle id (which was the bug behind a build
          # that failed with "main app requires App Groups + Sign In with
          # Apple" — the "main" profile was actually pointing at the share
          # extension bundle id and didn't have those capabilities).
          MAIN_DB_ID=$(app-store-connect bundle-ids list \
            --bundle-id-identifier $MAIN_BUNDLE --json \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for b in data:
              if b.get('attributes', {}).get('identifier') == '$MAIN_BUNDLE':
                  print(b['id']); break
          ")
          EXT_DB_ID=$(app-store-connect bundle-ids list \
            --bundle-id-identifier $EXT_BUNDLE --json \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for b in data:
              if b.get('attributes', {}).get('identifier') == '$EXT_BUNDLE':
                  print(b['id']); break
          ")
          if [ -z "$MAIN_DB_ID" ] || [ -z "$EXT_DB_ID" ]; then
            echo "ERROR: bundle id lookup failed (main=$MAIN_DB_ID ext=$EXT_DB_ID)"
            exit 1
          fi
          if [ "$MAIN_DB_ID" = "$EXT_DB_ID" ]; then
            echo "ERROR: main and ext bundle ids resolved to same record ($MAIN_DB_ID) — exact-match filter is broken"
            exit 1
          fi
          echo "Bundle ids: main=$MAIN_DB_ID ext=$EXT_DB_ID"
          export MAIN_DB_ID EXT_DB_ID

          # Diagnostic: dump capabilities for both bundle ids.
          for BID in $MAIN_DB_ID $EXT_DB_ID; do
            echo "--- BEFORE: capabilities for $BID ---"
            app-store-connect bundle-ids capabilities $BID 2>&1 | head -80 || true
          done

          # codemagic-cli-tools' bundle-ids enable-capabilities turns the
          # capability ON but has no way to ASSIGN a specific App Group to
          # it (Apple's portal does this with the "Configure → tick group
          # → Save" flow). When the assignment is missing, the new profile
          # has App Groups capability but no actual group id, and
          # xcodebuild rejects it with "doesn't support the
          # group.com.newsletterpod.shared App Group".
          #
          # Fix: hit Apple's relationships API directly to attach the App
          # Group to both bundle ids. Uses the same App Store Connect API
          # key the codemagic integration provides.
          python3 <<'PYEOF'
          import json, os, sys, time, urllib.request

          # PyJWT ships with codemagic-cli-tools so it's already installed.
          try:
              import jwt
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', 'pyjwt[crypto]'])
              import jwt

          key_id = os.environ['APP_STORE_CONNECT_KEY_IDENTIFIER']
          issuer = os.environ['APP_STORE_CONNECT_ISSUER_ID']
          # The integration mounts the private key either inline (PEM string)
          # or as a file path. Handle both.
          raw_key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')
          if raw_key.startswith('-----BEGIN'):
              private_key = raw_key
          else:
              # Codemagic's integration sets the env var to e.g.
              # "@file:/Users/builder/.appstoreconnect/private_keys/AuthKey_XYZ.p8"
              # Strip the @file: prefix and read the actual file.
              path = raw_key.removeprefix('@file:') if raw_key.startswith('@file:') else raw_key
              with open(path) as f:
                  private_key = f.read()

          now = int(time.time())
          token = jwt.encode(
              {'iss': issuer, 'iat': now, 'exp': now + 20 * 60, 'aud': 'appstoreconnect-v1'},
              private_key,
              algorithm='ES256',
              headers={'kid': key_id, 'typ': 'JWT'},
          )

          def api(method, path, body=None):
              req = urllib.request.Request(
                  f'https://api.appstoreconnect.apple.com{path}',
                  method=method,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/json',
                  },
                  data=json.dumps(body).encode() if body else None,
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      raw = r.read()
                      return json.loads(raw) if raw else {}
              except urllib.error.HTTPError as e:
                  body = e.read().decode(errors='replace')
                  print(f'HTTP {e.code} on {method} {path}: {body}', file=sys.stderr)
                  raise

          # Find the App Group resource id for our identifier.
          app_groups = api('GET', '/v1/appGroups?filter[identifier]=group.com.newsletterpod.shared')
          ag_records = app_groups.get('data', [])
          if not ag_records:
              print('ERROR: App Group group.com.newsletterpod.shared not found', file=sys.stderr)
              sys.exit(1)
          ag_id = ag_records[0]['id']
          print(f'App Group internal id: {ag_id}')

          for bundle_id in (os.environ['MAIN_DB_ID'], os.environ['EXT_DB_ID']):
              print(f'Assigning {ag_id} to bundle {bundle_id}...')
              api(
                  'PATCH',
                  f'/v1/bundleIds/{bundle_id}/relationships/appGroups',
                  {'data': [{'type': 'appGroups', 'id': ag_id}]},
              )
              print(f'  done')
          PYEOF

          # Clear local provisioning-profile cache (where ios_signing put
          # the stale main app profile) so the fresh downloads aren't
          # shadowed by it.
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision

          # Each build creates fresh profiles with a unique timestamped
          # name so we don't collide with profiles from previous builds.
          # Old profiles linger in App Store Connect but don't interfere
          # (xcodebuild matches by UUID-of-current-profile, not by name).
          # If/when they accumulate enough to clutter the portal, prune
          # them manually — they're harmless otherwise.
          TS=$(date +%Y%m%d_%H%M%S)
          app-store-connect profiles create \
            $MAIN_DB_ID \
            --certificate-ids $CERT_ID \
            --type IOS_APP_STORE \
            --name "ClawCast Main App $TS" \
            --save
          app-store-connect profiles create \
            $EXT_DB_ID \
            --certificate-ids $CERT_ID \
            --type IOS_APP_STORE \
            --name "ClawCast Share Extension $TS" \
            --save

          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/ios"
          # `app-store-connect get-latest-build-number` filters by the latest
          # App Store version it finds (e.g. a draft 1.1), which misses builds
          # uploaded against an older version line — caused 5 consecutive
          # TestFlight upload failures stuck at build 93 in May 2026. Query
          # TestFlight and App Store directly and take the max instead.
          LATEST_BUILD_NUMBER=0
          if [ -n "$APP_STORE_APPLE_ID" ]; then
            TF_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" --platform IOS 2>/dev/null || echo 0)
            AS_BUILD=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" --platform IOS 2>/dev/null || echo 0)
            case "$TF_BUILD" in ''|*[!0-9]*) TF_BUILD=0 ;; esac
            case "$AS_BUILD" in ''|*[!0-9]*) AS_BUILD=0 ;; esac
            LATEST_BUILD_NUMBER=$TF_BUILD
            if [ "$AS_BUILD" -gt "$LATEST_BUILD_NUMBER" ]; then
              LATEST_BUILD_NUMBER=$AS_BUILD
            fi
            echo "Latest build: TestFlight=$TF_BUILD AppStore=$AS_BUILD -> using $LATEST_BUILD_NUMBER"
            if [ "$LATEST_BUILD_NUMBER" -eq 0 ]; then
              echo "ERROR: both get-latest-testflight-build-number and get-latest-app-store-build-number returned 0. ASC API may be down or the integration token is broken — refusing to upload CFBundleVersion=1." >&2
              exit 1
            fi
          fi
          NEXT_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          echo "Setting CFBundleVersion to $NEXT_BUILD_NUMBER"
          agvtool new-version -all "$NEXT_BUILD_NUMBER"
      - name: Patch Info.plist for App Store validation
        script: |
          PLIST="$CM_BUILD_DIR/ios/NewsletterPodApp/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UILaunchScreen dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:1 string UIInterfaceOrientationPortraitUpsideDown" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:2 string UIInterfaceOrientationLandscapeLeft" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:3 string UIInterfaceOrientationLandscapeRight" "$PLIST"
          echo "=== Info.plist after patching ==="
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"
      - name: Build IPA for TestFlight
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  ios-ui-tests:
    name: iOS UI Tests
    max_build_duration: 30
    instance_type: mac_mini_m2
    # Manual-only. UI tests are useful as a pre-release smoke check but
    # auto-running them on every push made the iOS pipeline visibly red on
    # any flake (Xcode/iOS-26 animation issues, simulator warm-up jitter,
    # etc.) without blocking TestFlight ships. Trigger from the Codemagic
    # UI when capturing screenshots or validating an iOS upgrade.
    environment:
      vars:
        XCODE_PROJECT: "ios/NewsletterPod.xcodeproj"
        XCODE_SCHEME: "NewsletterPod"
      xcode: latest
    scripts:
      - name: Build design tokens
        script: |
          cd "$CM_BUILD_DIR/design-tokens"
          npm ci
          npm run build
          cd "$CM_BUILD_DIR"
          if ! git diff --exit-code ios/NewsletterPodApp/DesignTokens.swift design-tokens/dist/; then
            echo "ERROR: design-tokens outputs are stale. Run 'npm run build' in design-tokens/ and commit the regenerated files."
            exit 1
          fi
      - name: Install xcodegen and xcparse
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          brew list xcparse >/dev/null 2>&1 || brew install chargepoint/xcparse/xcparse
      - name: Generate Xcode project
        script: |
          cd "$CM_BUILD_DIR/ios"
          xcodegen generate --spec project.yml
      - name: Pick simulator
        script: |
          DEST_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable') and d['name'].startswith('iPhone'):
                      print(d['udid'])
                      sys.exit()
          sys.exit('no iPhone simulator found')
          ")
          echo "DEST_ID=$DEST_ID" >> "$CM_ENV"
          echo "Using simulator $DEST_ID"
      - name: Run XCUITest
        script: |
          cd "$CM_BUILD_DIR/ios"
          rm -rf build
          xcodebuild test \
            -project NewsletterPod.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination "id=$DEST_ID" \
            -resultBundlePath build/onboarding.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Extract screenshots
        script: |
          cd "$CM_BUILD_DIR/ios"
          mkdir -p build/screenshots
          xcparse screenshots build/onboarding.xcresult build/screenshots || true
          ls -la build/screenshots
          (cd build && zip -qr screenshots.zip screenshots)
    artifacts:
      - ios/build/onboarding.xcresult
      - ios/build/screenshots.zip
      - ios/build/screenshots/*.png
