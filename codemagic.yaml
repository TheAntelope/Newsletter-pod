workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.newsletterpod.app
      vars:
        XCODE_PROJECT: "ios/NewsletterPod.xcodeproj"
        XCODE_SCHEME: "NewsletterPod"
        APP_STORE_APPLE_ID: "6762568729"
      xcode: latest
    scripts:
      - name: Generate Xcode project
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          cd "$CM_BUILD_DIR/ios"
          xcodegen generate --spec project.yml
      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/ios"
          if [ -n "$APP_STORE_APPLE_ID" ]; then
            LATEST_BUILD_NUMBER=$(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID")
            if [ -z "$LATEST_BUILD_NUMBER" ]; then
              LATEST_BUILD_NUMBER=0
            fi
            NEXT_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          else
            NEXT_BUILD_NUMBER="${BUILD_NUMBER:-1}"
          fi
          agvtool new-version -all "$NEXT_BUILD_NUMBER"
      - name: Patch Info.plist for App Store validation
        script: |
          PLIST="$CM_BUILD_DIR/ios/NewsletterPodApp/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UILaunchScreen dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:1 string UIInterfaceOrientationPortraitUpsideDown" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:2 string UIInterfaceOrientationLandscapeLeft" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:3 string UIInterfaceOrientationLandscapeRight" "$PLIST"
          echo "=== Info.plist after patching ==="
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"
      - name: Build IPA for TestFlight
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  ios-ui-tests:
    name: iOS UI Tests
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      vars:
        XCODE_PROJECT: "ios/NewsletterPod.xcodeproj"
        XCODE_SCHEME: "NewsletterPod"
      xcode: latest
    scripts:
      - name: Install xcodegen and xcparse
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          brew list xcparse >/dev/null 2>&1 || brew install chargepoint/xcparse/xcparse
      - name: Generate Xcode project
        script: |
          cd "$CM_BUILD_DIR/ios"
          xcodegen generate --spec project.yml
      - name: Pick simulator
        script: |
          DEST_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable') and d['name'].startswith('iPhone'):
                      print(d['udid'])
                      sys.exit()
          sys.exit('no iPhone simulator found')
          ")
          echo "DEST_ID=$DEST_ID" >> "$CM_ENV"
          echo "Using simulator $DEST_ID"
      - name: Run XCUITest
        script: |
          cd "$CM_BUILD_DIR/ios"
          rm -rf build
          xcodebuild test \
            -project NewsletterPod.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination "id=$DEST_ID" \
            -resultBundlePath build/onboarding.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Extract screenshots
        script: |
          cd "$CM_BUILD_DIR/ios"
          mkdir -p build/screenshots
          xcparse screenshots build/onboarding.xcresult build/screenshots || true
          ls -la build/screenshots
          (cd build && zip -qr screenshots.zip screenshots)
    artifacts:
      - ios/build/onboarding.xcresult
      - ios/build/screenshots.zip
      - ios/build/screenshots/*.png
