name: app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # HTTP client for the backend API layer.
  http: ^1.2.2
  # JSON (de)serialization annotations for the DTO layer (codegen via
  # json_serializable + build_runner in dev_dependencies).
  json_annotation: ^4.12.0
  just_audio: ^0.10.5
  speech_to_text: ^7.4.0
  url_launcher: ^6.3.2
  # "Share to ClawCast": receives content from the OS share sheet (Android
  # ACTION_SEND intent filters + the iOS Share Extension's App Group). Only
  # subscribed on the real-auth build (see services/share_intake_controller.dart);
  # the demo build + widget tests never touch the platform channel.
  receive_sharing_intent: ^1.8.0
  # Firebase Auth + Google Sign-In for the real (account-gated) sign-in path.
  # Only exercised when --dart-define=ENABLE_GOOGLE_SIGN_IN=true; the default
  # (demo) build never initializes Firebase, so widget tests stay channel-free.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  # Sign in with Apple (iOS primary auth; required by App Store Guideline 4.8
  # since we also offer Google). Used only on the real-auth path; the token is
  # exchanged at /v1/auth/apple to preserve existing Apple-`sub` identities.
  sign_in_with_apple: ^6.1.0
  # FCM push (Android + iOS). Registration runs only on the real-auth path; the
  # demo build never touches it.
  firebase_messaging: ^15.1.3
  # Renders a heads-up notification when a push arrives while the app is in the
  # foreground (FCM does NOT display those itself) and owns the Android
  # notification channel. Only used on the real-auth path.
  flutter_local_notifications: ^17.2.3
  # RevenueCat (Play Billing) purchases. Only configured/used on the real-auth
  # path behind ENABLE_PURCHASES_REVENUECAT; the demo build never touches it.
  purchases_flutter: ^8.0.0
  # Device location for the optional weather feature ("use my current
  # location"). Works on web + Android + iOS; reverse-geocoding to a city name
  # is done over HTTP (see services/location_service.dart), not a plugin.
  geolocator: ^14.0.2
  # Local persistence for the handful of client-only UI flags we keep across
  # launches (currently just the dashboard share-tip dismissal). Only the
  # real-auth build constructs the prefs-backed store (see main.dart); the demo
  # build + widget tests use InMemoryShareTipStore and never touch the channel.
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Codegen for the DTO layer (generates *.g.dart fromJson/toJson).
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

  # Generates the Android launcher icons (legacy mipmaps + adaptive icon) from
  # the brand assets below. Run after changing the icon:
  #   dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

# Launcher-icon generation. Run after changing the icon:  dart run flutter_launcher_icons
# Android (legacy mipmaps + adaptive) is generated from the cleaned brand variants:
#   - app-icon.png:            black corners masked to transparent (legacy mipmaps)
#   - app-icon-foreground.png: zoomed past the frame, cream-filled (adaptive layer)
# The generator insets the adaptive foreground 16%, so the zoomed variant lands in
# the safe zone with the frame cropped off and its cream edge blending into the
# cream background.
# iOS is generated from app-icon-ios.png — a verbatim copy of the native app's
# shipped icon (ios/NewsletterPodApp/.../icon-1024.png): opaque RGB 1024 with the
# baked black rounded frame, so upgrading iOS users keep the exact same home-screen
# icon. (Was `ios: false` while the native app owned the icon; now Flutter owns it.)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/app-icon.png"
  image_path_ios: "assets/brand/app-icon-ios.png"
  adaptive_icon_background: "#FBF2E6"
  adaptive_icon_foreground: "assets/brand/app-icon-foreground.png"
  min_sdk_android: 21

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # Opt out of Flutter's iOS UIScene lifecycle migration. Flutter 3.44's UIScene
  # template (FlutterSceneDelegate + UIApplicationSceneManifest) crashes at launch
  # on iOS 26 inside scene state-restoration (_saveSceneRestorationState ->
  # stateRestorationActivity assertion, EXC_BREAKPOINT). We stay on the classic
  # AppDelegate lifecycle (Runner/AppDelegate.swift + UIMainStoryboardFile=Main)
  # until Flutter fixes the iOS 26 scene path. This flag also stops the build-time
  # auto-migrator from re-injecting the scene manifest. See flutter#183586.
  config:
    enable-uiscene-migration: false

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # Source-of-record snapshots of the production catalogs (GET /v1/sources/catalog
    # + /v1/voices/catalog). These are EMBEDDED as Dart constants in
    # lib/data/demo_catalog_data.dart (rootBundle resolves on the real clock, which
    # hangs flutter_test's fake clock) — bundled here too only as readable reference.
    - assets/demo/
    # Brand attribution. backed-by-elevenlabs-grants.webp is the official "Backed
    # by ElevenLabs Grants" lockup (black variant, from the ElevenLabs Grants
    # brand kit), shown on the sign-in and onboarding-welcome screens. See
    # lib/widgets/editorial.dart (ElevenLabsBadge).
    - assets/brand/

  # Spectral: the editorial serif for the display/title/subtitle tokens
  # (fontFamily 'Spectral' in design_tokens.dart). Matches iOS's serif identity
  # and renders consistently on web + Android.
  fonts:
    - family: Spectral
      fonts:
        - asset: assets/fonts/Spectral-Regular.ttf
          weight: 400
        - asset: assets/fonts/Spectral-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Spectral-Bold.ttf
          weight: 700

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
