# Some plugins (e.g. receive_sharing_intent) hardcode a Java target of 11 but
# let their Kotlin inherit the build image's JDK 17, which AGP 8 rejects as an
# inconsistent JVM target. The bytecode levels are runtime-compatible, so
# downgrade the consistency check from error to warning rather than forking the
# plugins. (Officially supported Kotlin Gradle escape hatch.)
kotlin.jvm.target.validation.mode=warning
