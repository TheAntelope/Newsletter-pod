steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:$COMMIT_SHA
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - newsletter-pod
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: smoke
    entrypoint: bash
    env:
      - APP_BASE_URL=${_APP_BASE_URL}
      - SMOKE_USER_ID=${_SMOKE_USER_ID}
      - RUN_SMOKE=${_RUN_SMOKE}
    secretEnv:
      - JOB_TRIGGER_TOKEN
    args:
      - -c
      - |
        if [[ "${RUN_SMOKE}" != "true" ]]; then
          echo "Skipping smoke step (_RUN_SMOKE=${RUN_SMOKE:-unset})"
          exit 0
        fi
        exec scripts/post_deploy_smoke.sh

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:$COMMIT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/job-trigger-token/versions/latest
      env: JOB_TRIGGER_TOKEN

substitutions:
  _APP_BASE_URL: https://newsletter-pod-497154432194.europe-west1.run.app
  _SMOKE_USER_ID: ""
  _RUN_SMOKE: "false"

options:
  logging: CLOUD_LOGGING_ONLY
