steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: snapshot-weekly-changes
    entrypoint: bash
    args:
      - -c
      - |
        python3 scripts/snapshot_weekly_changes.py --days 21

  - name: gcr.io/cloud-builders/docker
    id: build
    waitFor: ["snapshot-weekly-changes"]
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:$COMMIT_SHA
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - newsletter-pod
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --no-cpu-throttling
      # --update-env-vars only touches the listed keys; existing env vars and
      # secret bindings on the service are preserved (unlike --set-env-vars,
      # which would re-create the May 2026 secret-binding regression).
      # APNS_TEAM_ID / APNS_BUNDLE_ID / APNS_ENVIRONMENT are non-secret. The
      # Team ID is the 10-char Apple Developer Team Identifier (find it at
      # developer.apple.com → Membership). APNS_ENABLED gates the whole
      # push path so this revision can ship before the Portal+secret setup
      # lands without ELOG spam.
      # FIREBASE_PROJECT_ID gates the FirebaseIdentityVerifier used by the
      # Android/Flutter /v1/auth/firebase sign-in. Non-secret (the project id is
      # public, also in google-services.json). Without it, every Firebase
      # sign-in 400s with "FIREBASE_PROJECT_ID is not configured".
      - --update-env-vars=SOURCE_ITEM_EMBEDDINGS_ENABLED=true,CANDIDATE_QUEUE_ENABLED=true,APNS_ENABLED=true,APNS_TEAM_ID=R7HS2T53Z8,APNS_BUNDLE_ID=com.newsletterpod.app,APNS_ENVIRONMENT=production,FIREBASE_PROJECT_ID=theclawcast-9a045
      # Pin every critical secret on every deploy so that if a future config
      # edit strips a binding (as happened on revision 00045 on 2026-05-01,
      # and again with MAILGUN_WEBHOOK_SIGNING_KEY in 2026-05), the next deploy
      # self-heals it. --update-secrets only touches the listed keys; other
      # bindings on the service are preserved.
      #
      # APNs needs two secrets:
      #   apns-auth-key  → contents of the .p8 file downloaded from Apple
      #   apns-key-id    → the 10-char Key ID shown next to the key in Portal
      # Create both before the first deploy that sets APNS_ENABLED=true;
      # otherwise the push sender no-ops with an info-log (safe but silent).
      #
      # X (Twitter) needs four OAuth 1.0a credentials for the broadcast-loop
      # poster. Missing any one causes /jobs/broadcast/publish and
      # /generate-and-publish to return 503 cleanly — the service still boots.
      # Create x-api-key, x-api-secret, x-access-token, x-access-token-secret
      # in Secret Manager from values minted at developer.x.com → Keys and
      # tokens (with App permissions set to Read and Write) before this
      # deploy runs, or the gcloud step will fail on the missing binding.
      - --update-secrets=PODCAST_API_KEY=openai-api-key:latest,ELEVENLABS_API_KEY=elevenlabs-api-key:latest,JOB_TRIGGER_TOKEN=newsletter-pod-job-trigger-token:latest,FEED_TOKEN=newsletter-pod-feed-token:latest,SMTP_PASSWORD=smtp-password:latest,MAILGUN_WEBHOOK_SIGNING_KEY=mailgun-webhook-signing-key:latest,APNS_AUTH_KEY=apns-auth-key:latest,APNS_KEY_ID=apns-key-id:latest,X_API_KEY=x-api-key:latest,X_API_SECRET=x-api-secret:latest,X_ACCESS_TOKEN=x-access-token:latest,X_ACCESS_TOKEN_SECRET=x-access-token-secret:latest
      - --quiet

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:$COMMIT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/newsletter-pod:latest

options:
  logging: CLOUD_LOGGING_ONLY
