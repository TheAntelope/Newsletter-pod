name: NewsletterPod
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: NewsletterPod
    PRODUCT_BUNDLE_IDENTIFIER: com.newsletterpod.app
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.10"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_FILE: NewsletterPodApp/Info.plist
    CODE_SIGN_ENTITLEMENTS: NewsletterPodApp/NewsletterPod.entitlements
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: NO
targets:
  NewsletterPod:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NewsletterPodApp
        excludes:
          - Assets.xcassets/**/Contents.json
    resources:
      - path: NewsletterPodApp/Assets.xcassets
    settings:
      base:
        PRODUCT_MODULE_NAME: NewsletterPod
        INFOPLIST_KEY_CFBundleDisplayName: NewsletterPod
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
        ENABLE_PREVIEWS: YES
schemes:
  NewsletterPod:
    build:
      targets:
        NewsletterPod: all
    run:
      config: Debug
    archive:
      config: Release
