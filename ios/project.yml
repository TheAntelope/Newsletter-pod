name: NewsletterPod
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: NewsletterPod
    PRODUCT_BUNDLE_IDENTIFIER: com.newsletterpod.app
    DEVELOPMENT_TEAM: "R7HS2T53Z8"
    SWIFT_VERSION: "5.10"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_FILE: NewsletterPodApp/Info.plist
    CODE_SIGN_ENTITLEMENTS: NewsletterPodApp/NewsletterPod.entitlements
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: NO
targets:
  NewsletterPod:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NewsletterPodApp
        excludes:
          - Assets.xcassets/**/Contents.json
          - Configuration.storekit
    resources:
      - path: NewsletterPodApp/Assets.xcassets
      - path: NewsletterPodApp/Configuration.storekit
    settings:
      base:
        PRODUCT_MODULE_NAME: NewsletterPod
        INFOPLIST_KEY_CFBundleDisplayName: mycast
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
        ENABLE_PREVIEWS: YES
  NewsletterPodUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NewsletterPodUITests
    dependencies:
      - target: NewsletterPod
    settings:
      base:
        PRODUCT_NAME: NewsletterPodUITests
        PRODUCT_MODULE_NAME: NewsletterPodUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.newsletterpod.app.uitests
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: "R7HS2T53Z8"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ""
        CODE_SIGN_ENTITLEMENTS: ""
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  NewsletterPod:
    build:
      targets:
        NewsletterPod: all
        NewsletterPodUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: NewsletterPodApp/Configuration.storekit
    test:
      config: Debug
      targets:
        - NewsletterPodUITests
    archive:
      config: Release
